name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy values so @vercel/kv can initialize; no KV call happens at
          # build time (all KV-backed routes/pages are dynamic).
          KV_REST_API_URL: https://ci-placeholder.upstash.io
          KV_REST_API_TOKEN: ci-placeholder-token
          NEXT_PUBLIC_APP_URL: https://tipwall.vercel.app
